services:
  db:
    image: postgres:16-alpine
    container_name: viajaya_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: viajaya
      POSTGRES_PASSWORD: viajaya
      POSTGRES_DB: viajaya
    ports:
      - "5432:5432"
    volumes:
      - viajaya_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viajaya"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  viajaya_pgdata:
